<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Pet Corner Walker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Controls Panel -->
  <div class="controls-panel">
    <h3>Select Your Companion</h3>
    <div class="button-group">
      <button class="btn" onclick="selectCharacter('duck')">🦆 Duck</button>
      <button class="btn" onclick="selectCharacter('cat')">🐱 Cat</button>
      <button class="btn" onclick="selectCharacter('dog')">🐶 Dog</button>
      <button class="btn stop-btn" onclick="stopWidget()">🛑 Stop</button>
    </div>

    <!-- Reminder Input Section -->
    <div class="reminder-input-container">
      <input type="text" id="reminder-input" placeholder="Type a reminder..." maxlength="100" />
      <button class="btn add-btn" onclick="addReminder()">Add</button>
    </div>

    <!-- Active Reminders List (To Clear Anytime) -->
    <div id="reminders-list" class="reminders-list"></div>
  </div>

  <!-- Moving Sprite Container -->
  <div id="pixel-pet" class="pixel-pet idle">
    <!-- Speech Bubbles Container -->
    <div id="speech-bubbles" class="speech-bubbles"></div>
    <!-- Character Icon -->
    <span id="pet-avatar"></span>
  </div>

  <script src="script.js"></script>
</body>
</html>
